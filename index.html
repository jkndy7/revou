<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pet the Scary Dog 🐾</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom animations not available in Tailwind out of the box */
    @keyframes wiggle {
      0%, 100% { transform: rotate(-6deg) scale(1.05); }
      50%       { transform: rotate(6deg)  scale(1.1); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%      { transform: translateX(-10px) rotate(-3deg); }
      40%      { transform: translateX(10px)  rotate(3deg); }
      60%      { transform: translateX(-8px)  rotate(-2deg); }
      80%      { transform: translateX(8px)   rotate(2deg); }
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0)   scale(1); }
      100% { opacity: 0; transform: translateY(-120px) scale(1.6); }
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%      { transform: scale(1.3); }
      28%      { transform: scale(1); }
      42%      { transform: scale(1.3); }
      70%      { transform: scale(1); }
    }
    @keyframes bounce-in {
      0%   { transform: scale(0.3); opacity: 0; }
      50%  { transform: scale(1.15); opacity: 1; }
      80%  { transform: scale(0.9); }
      100% { transform: scale(1); }
    }
    @keyframes tail-wag {
      0%, 100% { transform: rotate(-20deg); transform-origin: bottom left; }
      50%      { transform: rotate(20deg);  transform-origin: bottom left; }
    }
    @keyframes star-spin {
      0%   { transform: rotate(0deg)   scale(0); opacity: 1; }
      50%  { transform: rotate(180deg) scale(1.2); opacity: 1; }
      100% { transform: rotate(360deg) scale(0); opacity: 0; }
    }
    @keyframes paw-press {
      0%   { transform: scale(1); }
      50%  { transform: scale(0.85); }
      100% { transform: scale(1); }
    }
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 20px 4px rgba(251,113,133,0.4); }
      50%       { box-shadow: 0 0 45px 12px rgba(251,113,133,0.8); }
    }

    .wiggle          { animation: wiggle 0.5s ease-in-out; }
    .shake           { animation: shake 0.5s ease-in-out; }
    .heartbeat       { animation: heartbeat 1s ease-in-out; }
    .tail-wag        { animation: tail-wag 0.25s ease-in-out infinite; }
    .paw-press       { animation: paw-press 0.2s ease-in-out; }
    .glow-pulse      { animation: glow-pulse 1.5s ease-in-out infinite; }

    .float-emoji {
      position: absolute;
      pointer-events: none;
      font-size: 2rem;
      animation: floatUp 1s ease-out forwards;
      z-index: 50;
    }
    .star-burst {
      position: absolute;
      pointer-events: none;
      font-size: 1.5rem;
      animation: star-spin 0.8s ease-out forwards;
      z-index: 50;
    }

    /* Dog body parts */
    .dog-container {
      position: relative;
      display: inline-block;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .dog-emoji {
      font-size: 8rem;
      display: block;
      transition: transform 0.1s;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.25));
    }
    .tail {
      position: absolute;
      font-size: 2.5rem;
      bottom: 8px;
      right: -18px;
      transform-origin: bottom left;
      display: none;
    }
    .hearts-overlay {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      font-size: 1.5rem;
      display: none;
    }

    /* Reaction bubble */
    #reaction-bubble {
      transition: opacity 0.3s;
    }

    /* Progress bar fill */
    #mood-fill {
      transition: width 0.4s cubic-bezier(.4,2,.6,1);
    }

    /* Background gradient shifts */
    body {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
      min-height: 100vh;
    }

    /* Milestone flash */
    @keyframes flash-bg {
      0%, 100% { background-color: transparent; }
      50%       { background-color: rgba(251,191,36,0.15); }
    }
    .milestone-flash { animation: flash-bg 0.6s ease-in-out 2; }

    /* Click ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(251,113,133,0.35);
      transform: scale(0);
      animation: ripple-anim 0.6s linear;
      pointer-events: none;
      z-index: 10;
    }
    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    /* Scary mode */
    .scary-mode {
      filter: hue-rotate(280deg) saturate(2) drop-shadow(0 0 16px red) !important;
    }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen px-4 py-8 overflow-x-hidden">

  <!-- Title -->
  <h1 class="text-4xl sm:text-5xl font-black text-white mb-1 tracking-tight drop-shadow-lg text-center">
    Pet the Scary Dog
    <span class="inline-block animate-bounce">🐾</span>
  </h1>
  <p class="text-indigo-300 text-sm sm:text-base mb-6 text-center">Click the dog… if you dare.</p>

  <!-- Stats bar -->
  <div class="flex gap-6 mb-6 text-center">
    <div class="bg-white/10 backdrop-blur rounded-2xl px-5 py-3 border border-white/20">
      <p class="text-indigo-200 text-xs uppercase tracking-widest">Pets</p>
      <p id="pet-count" class="text-3xl font-black text-white">0</p>
    </div>
    <div class="bg-white/10 backdrop-blur rounded-2xl px-5 py-3 border border-white/20">
      <p class="text-indigo-200 text-xs uppercase tracking-widest">Streak</p>
      <p id="streak-count" class="text-3xl font-black text-yellow-300">🔥 0</p>
    </div>
    <div class="bg-white/10 backdrop-blur rounded-2xl px-5 py-3 border border-white/20">
      <p class="text-indigo-200 text-xs uppercase tracking-widest">Mood</p>
      <p id="mood-label" class="text-xl font-black text-pink-300">😠</p>
    </div>
  </div>

  <!-- Mood bar -->
  <div class="w-full max-w-sm mb-8">
    <div class="flex justify-between text-xs text-indigo-300 mb-1 px-1">
      <span>😡 Terrified</span>
      <span>🥰 Loves You</span>
    </div>
    <div class="h-4 bg-white/10 rounded-full overflow-hidden border border-white/20">
      <div id="mood-fill" class="h-full rounded-full bg-gradient-to-r from-pink-500 to-yellow-400" style="width: 10%"></div>
    </div>
  </div>

  <!-- Dog area -->
  <div class="relative flex flex-col items-center justify-center mb-8" id="dog-area">
    <!-- Reaction bubble -->
    <div id="reaction-bubble"
         class="absolute -top-16 left-1/2 -translate-x-1/2 bg-white text-gray-800 font-bold text-sm px-4 py-2 rounded-2xl shadow-lg border-2 border-pink-300 opacity-0 whitespace-nowrap z-20"
         style="pointer-events:none;">
      …
    </div>

    <!-- Floating emojis land here (injected by JS) -->

    <div class="dog-container" id="dog-btn" tabindex="0" role="button" aria-label="Pet the dog">
      <span class="dog-emoji" id="dog-face">🐺</span>
      <span class="tail" id="dog-tail">🦴</span>
      <span class="hearts-overlay" id="hearts-overlay">💖💖</span>
    </div>

    <!-- Ground shadow -->
    <div class="w-28 h-5 rounded-full bg-black/30 blur-sm mt-1"></div>
  </div>

  <!-- Milestone banner -->
  <div id="milestone-banner"
       class="fixed top-6 left-1/2 -translate-x-1/2 bg-yellow-400 text-yellow-900 font-black text-lg px-8 py-3 rounded-2xl shadow-2xl z-50 opacity-0 pointer-events-none transition-opacity duration-300">
    🎉 Milestone Unlocked!
  </div>

  <!-- Achievement log -->
  <div class="w-full max-w-sm">
    <h2 class="text-indigo-300 text-xs uppercase tracking-widest mb-2 text-center">Achievement Log</h2>
    <ul id="achievement-log" class="space-y-2 max-h-36 overflow-y-auto pr-1"></ul>
  </div>

  <p class="text-indigo-500 text-xs mt-8 text-center">Made with 🐾 · pet responsibly</p>

<script>
  // ─── State ────────────────────────────────────────────────────────────────
  const state = {
    pets: 0,
    streak: 0,
    streakTimer: null,
    mood: 10,          // 0-100
    lastPetTime: 0,
    scaryMode: false,
    unlockedMilestones: new Set(),
  };

  // ─── DOM refs ─────────────────────────────────────────────────────────────
  const dogBtn       = document.getElementById('dog-btn');
  const dogFace      = document.getElementById('dog-face');
  const dogTail      = document.getElementById('dog-tail');
  const heartsOvl    = document.getElementById('hearts-overlay');
  const petCountEl   = document.getElementById('pet-count');
  const streakEl     = document.getElementById('streak-count');
  const moodLabel    = document.getElementById('mood-label');
  const moodFill     = document.getElementById('mood-fill');
  const reactionBub  = document.getElementById('reaction-bubble');
  const milestoneBan = document.getElementById('milestone-banner');
  const achLog       = document.getElementById('achievement-log');
  const dogArea      = document.getElementById('dog-area');

  // ─── Reactions by mood tier ───────────────────────────────────────────────
  const reactions = {
    low: [ // mood < 30
      { text: '😤 Back off!',          emojis: ['⚡','😡','🦷'] },
      { text: '🐺 *low growl*',        emojis: ['😤','🌑','👀'] },
      { text: '🚫 Do NOT touch me.',   emojis: ['🚫','😠','❌'] },
      { text: '👁️ I am watching you.', emojis: ['👁️','🌑','⚠️'] },
      { text: '🦷 *shows teeth*',      emojis: ['🦷','😈','🔴'] },
    ],
    mid: [ // mood 30–70
      { text: '🤔 …maybe.',            emojis: ['❓','🤔','✨'] },
      { text: '😒 Fine. One pat.',     emojis: ['😒','🐾','🌟'] },
      { text: '🐾 *sniff sniff*',      emojis: ['👃','🌸','💨'] },
      { text: '😐 You may continue.',  emojis: ['😐','✨','🌙'] },
      { text: '🧐 Interesting human.', emojis: ['🧐','💡','⭐'] },
      { text: '😌 OK fine…',           emojis: ['😌','🌸','💫'] },
    ],
    high: [ // mood > 70
      { text: '🥰 Best hooman ever!',  emojis: ['❤️','🌈','✨'] },
      { text: '🎉 YES YES YES!',       emojis: ['🎊','💥','🌟'] },
      { text: '💃 *zoomies activated*',emojis: ['🌪️','🐕','💨'] },
      { text: '😍 Pet me forever!',    emojis: ['💖','💗','💕'] },
      { text: '🐶 *tail going wild*',  emojis: ['🦴','🎾','💛'] },
      { text: '🌟 You are my person!', emojis: ['🌟','🏆','💝'] },
    ],
  };

  // ─── Dog faces by mood ────────────────────────────────────────────────────
  const dogFaces = {
    low:  ['😡','👿','🐺'],
    mid:  ['😒','😐','🐶'],
    high: ['😊','🥰','🐕'],
  };

  // ─── Milestones ───────────────────────────────────────────────────────────
  const milestones = [
    { at: 1,    msg: '🐾 First Pet!',          badge: '🐾' },
    { at: 5,    msg: '5 Pets – Brave soul!',    badge: '🦊' },
    { at: 10,   msg: '10 Pets – Dog whisperer!',badge: '🐺' },
    { at: 25,   msg: '25 Pets – True friend!',  badge: '💛' },
    { at: 50,   msg: '50 Pets – Legendary!',    badge: '🏆' },
    { at: 100,  msg: '100 Pets – GOATED! 🐐',   badge: '👑' },
    { at: 200,  msg: '200 Pets – Ascended!',    badge: '🌟' },
    { at: 500,  msg: '500 Pets – You ok??',     badge: '🫡' },
  ];

  // ─── Utilities ────────────────────────────────────────────────────────────
  function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function clamp(v, min, max) { return Math.min(max, Math.max(min, v)); }

  function getMoodTier() {
    if (state.mood < 30) return 'low';
    if (state.mood < 70) return 'mid';
    return 'high';
  }

  function getMoodEmoji() {
    const tier = getMoodTier();
    if (tier === 'low')  return '😡';
    if (tier === 'mid')  return '😐';
    return '🥰';
  }

  function triggerClass(el, cls, duration = 600) {
    el.classList.remove(cls);
    void el.offsetWidth; // reflow
    el.classList.add(cls);
    setTimeout(() => el.classList.remove(cls), duration);
  }

  // ─── Floating emoji burst ─────────────────────────────────────────────────
  function spawnFloaters(emojis, originEl) {
    const rect = originEl.getBoundingClientRect();
    emojis.forEach((emoji, i) => {
      const el = document.createElement('span');
      el.className = 'float-emoji';
      el.textContent = emoji;
      const xOff = (Math.random() - 0.5) * 120;
      const yOff = -20 - Math.random() * 30;
      el.style.left = (rect.left + rect.width / 2 + xOff + window.scrollX) + 'px';
      el.style.top  = (rect.top  + yOff + window.scrollY) + 'px';
      el.style.animationDelay = (i * 0.08) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    });
  }

  function spawnStarBurst(originEl) {
    const rect = originEl.getBoundingClientRect();
    const stars = ['✨','⭐','💫','🌟'];
    for (let i = 0; i < 5; i++) {
      const el = document.createElement('span');
      el.className = 'star-burst';
      el.textContent = rand(stars);
      const angle = (i / 5) * 360;
      const dist = 60 + Math.random() * 40;
      el.style.left = (rect.left + rect.width / 2 + Math.cos(angle) * dist + window.scrollX) + 'px';
      el.style.top  = (rect.top  + rect.height / 2 + Math.sin(angle) * dist + window.scrollY) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 900);
    }
  }

  // ─── Ripple effect ────────────────────────────────────────────────────────
  function spawnRipple(e, el) {
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const rect = el.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    ripple.style.width  = size + 'px';
    ripple.style.height = size + 'px';
    ripple.style.left   = (e.clientX - rect.left - size / 2) + 'px';
    ripple.style.top    = (e.clientY - rect.top  - size / 2) + 'px';
    el.appendChild(ripple);
    setTimeout(() => ripple.remove(), 700);
  }

  // ─── Show reaction bubble ─────────────────────────────────────────────────
  let bubbleTimeout;
  function showBubble(text) {
    reactionBub.textContent = text;
    reactionBub.style.opacity = '1';
    clearTimeout(bubbleTimeout);
    bubbleTimeout = setTimeout(() => { reactionBub.style.opacity = '0'; }, 1800);
  }

  // ─── Update dog visual ────────────────────────────────────────────────────
  function updateDogVisual() {
    const tier = getMoodTier();
    dogFace.textContent = rand(dogFaces[tier]);

    // Scary mode at low mood
    if (tier === 'low') {
      dogFace.classList.add('scary-mode');
    } else {
      dogFace.classList.remove('scary-mode');
    }

    // Tail wag only when happy
    if (tier === 'high') {
      dogTail.style.display = 'block';
      dogTail.classList.add('tail-wag');
      heartsOvl.style.display = 'block';
      dogBtn.classList.add('glow-pulse');
    } else {
      dogTail.style.display = 'none';
      dogTail.classList.remove('tail-wag');
      heartsOvl.style.display = 'none';
      dogBtn.classList.remove('glow-pulse');
    }
  }

  // ─── Update UI stats ──────────────────────────────────────────────────────
  function updateUI() {
    petCountEl.textContent = state.pets;
    streakEl.textContent   = '🔥 ' + state.streak;
    moodLabel.textContent  = getMoodEmoji();
    moodFill.style.width   = clamp(state.mood, 2, 100) + '%';
    updateDogVisual();
  }

  // ─── Milestones check ─────────────────────────────────────────────────────
  function checkMilestones() {
    milestones.forEach(m => {
      if (state.pets === m.at && !state.unlockedMilestones.has(m.at)) {
        state.unlockedMilestones.add(m.at);
        flashMilestone(m.msg);
        addAchievement(m.badge, m.msg);
      }
    });
  }

  function flashMilestone(msg) {
    milestoneBan.textContent = msg;
    milestoneBan.style.opacity = '1';
    document.body.classList.add('milestone-flash');
    setTimeout(() => {
      milestoneBan.style.opacity = '0';
      document.body.classList.remove('milestone-flash');
    }, 2400);
  }

  function addAchievement(badge, msg) {
    const li = document.createElement('li');
    li.className = 'flex items-center gap-2 bg-white/10 border border-white/20 rounded-xl px-3 py-2 text-sm text-white animate-pulse';
    li.innerHTML = `<span class="text-xl">${badge}</span><span>${msg}</span>`;
    achLog.prepend(li);
    setTimeout(() => li.classList.remove('animate-pulse'), 2000);
  }

  // ─── Streak logic ─────────────────────────────────────────────────────────
  function updateStreak() {
    const now = Date.now();
    if (now - state.lastPetTime < 2000) {
      state.streak++;
    } else {
      state.streak = 1;
    }
    state.lastPetTime = now;

    // Reset streak after 2s of inactivity
    clearTimeout(state.streakTimer);
    state.streakTimer = setTimeout(() => {
      state.streak = 0;
      streakEl.textContent = '🔥 0';
    }, 2000);
  }

  // ─── Main pet handler ─────────────────────────────────────────────────────
  function onPet(e) {
    state.pets++;
    updateStreak();

    // Mood increases faster with streak
    const moodGain = 5 + Math.min(state.streak * 1.5, 15);
    state.mood = clamp(state.mood + moodGain, 0, 100);

    // Mood decays slightly on low tier
    const tier = getMoodTier();

    // Pick reaction
    const pool = reactions[tier];
    const reaction = rand(pool);
    showBubble(reaction.text);

    // Animations
    if (tier === 'low') {
      triggerClass(dogBtn, 'shake', 500);
    } else if (tier === 'mid') {
      triggerClass(dogBtn, 'wiggle', 500);
    } else {
      triggerClass(dogBtn, 'heartbeat', 1000);
      spawnStarBurst(dogBtn);
    }
    triggerClass(dogBtn, 'paw-press', 200);

    // Floaters
    spawnFloaters(reaction.emojis, dogBtn);

    // Ripple
    if (e && e.clientX) spawnRipple(e, dogBtn);

    // Mood decay timer — dog gets grumpy again slowly
    scheduleMoodDecay();

    updateUI();
    checkMilestones();
  }

  // ─── Mood decay ───────────────────────────────────────────────────────────
  let decayInterval;
  function scheduleMoodDecay() {
    clearInterval(decayInterval);
    decayInterval = setInterval(() => {
      if (state.mood > 10) {
        state.mood = clamp(state.mood - 2, 10, 100);
        updateUI();
      } else {
        clearInterval(decayInterval);
      }
    }, 3000);
  }

  // ─── Keyboard support ─────────────────────────────────────────────────────
  dogBtn.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') onPet(null);
  });

  // ─── Click / tap ──────────────────────────────────────────────────────────
  dogBtn.addEventListener('click',      onPet);
  dogBtn.addEventListener('touchstart', e => { e.preventDefault(); onPet(e.touches[0]); }, { passive: false });

  // ─── Init ─────────────────────────────────────────────────────────────────
  updateUI();
  scheduleMoodDecay();
</script>
</body>
</html>
